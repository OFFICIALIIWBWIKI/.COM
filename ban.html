<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAN ROOM :: IIWB SECURITY</title>
  <link rel="icon" type="image/png" href="./IIWB%20LOGO.png">
  <style>
    body {
      margin: 0;
      background: #1d0000;
      font-family: Tahoma, Arial, sans-serif;
      color: #fff;
      text-align: center;
      background-image:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%);
      background-size: 40px 40px;
      background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
    }

    .wrap {
      max-width: 760px;
      margin: 40px auto;
      background: #3c0000;
      border: 4px solid #ff5555;
      box-shadow: 0 0 0 6px #fff, 0 0 25px rgba(0,0,0,0.5);
      padding: 25px;
    }

    h1 {
      font-size: 46px;
      margin: 10px 0;
      color: #ffd5d5;
      text-shadow: 2px 2px 0 #8a0000;
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      to { visibility: hidden; }
    }

    .logo-row img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin: 6px;
      background: #fff;
      border: 3px solid #ff7d7d;
    }

    .big-box {
      margin-top: 16px;
      background: #5a0000;
      border: 2px dashed #ffc0c0;
      padding: 16px;
      font-size: 18px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 14px;
      background: linear-gradient(#fff39c, #f1bd2a);
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border: 2px outset #fff6c8;
    }

    .btn:active {
      border-style: inset;
    }

    .counter {
      display: inline-block;
      margin-top: 14px;
      background: #000;
      color: #ff5b5b;
      padding: 5px 10px;
      font-family: 'Courier New', monospace;
      border: 2px inset #666;
      letter-spacing: 2px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-row">
      <img src="./IIWB%20LOGO.png" alt="IIWB logo">
      <img src="https://img.sanishtech.com/u/6d5083667a8f1bcb4514b7df06791e2b.png" alt="security logo" onerror="this.src='./IIWB%20LOGO.png'">
      <img src="./IIWB%20LOGO.png" alt="IIWB logo 2">
    </div>

    <h1>BAN ROOM</h1>
    <div class="big-box">
      Suspicious activity detected.<br>
      The IIWB Security Department has decided that you are either a spy, an asset thief, or a very dramatic visitor.<br><br>
      Please sit in this red room and think about your choices.
    </div>

    <div class="counter">ACCESS DENIED :: 3102</div><br>
    <a class="btn" href="index.html">TRY THE SPY DETECTOR AGAIN</a>
  </div>
</body>
</html>
